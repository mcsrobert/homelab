---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flux Local

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-job:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: kubernetes/**

  test:
    needs: pre-job
    runs-on: ubuntu-latest
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.8.7

      - name: Run flux-local test
        uses: allenporter/flux-local/action/test@8.2.0
        with:
          path: kubernetes/cluster
          enable-helm: true
          sources: flux-system

  diff:
    needs: pre-job
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resources: ["helmrelease", "kustomization"]
      max-parallel: 4
      fail-fast: false
    if: ${{ needs.pre-job.outputs.any_changed == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@v2.8.7

      - name: Run flux-local diff
        uses: allenporter/flux-local/action/diff@8.2.0
        id: diff
        with:
          path: kubernetes/cluster
          live-branch: ${{ github.event.repository.default_branch }}
          resource: ${{ matrix.resources }}
          sources: flux-system
          skip-invalid-kustomization-paths: true

      - name: Add Comment
        if: ${{ steps.diff.outputs.diff != '' }}
        uses: mshick/add-pr-comment@8e4927817251f1ff60c001f04568532b38e0b4a0 # v3.11
        continue-on-error: true
        with:
          message-id: ${{ github.event.pull_request.number }}/${{ matrix.resources }}
          message-failure: Diff was not successful
          message: |-
            ```diff
            ${{ steps.diff.outputs.diff }}
            ```
