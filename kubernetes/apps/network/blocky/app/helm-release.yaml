---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blocky
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      blocky:
        replicas: 4
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: DoNotSchedule
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: blocky
          securityContext:
            runAsNonRoot: true
            runAsUser: &nobody 65534
            runAsGroup: *nobody
            seccompProfile:
              type: RuntimeDefault
        containers:
          blocky:
            image:
              repository: ghcr.io/0xerr0r/blocky
              tag: v0.31.0@sha256:2e5696efe4f920a9c07efa5587650fb94e7c4dc68759a77debde3daaa1e30cdb
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &dnsPort 1053
                  initialDelaySeconds: 20  # blocklist download on startup
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        type: secret
        name: blocky-config
        globalMounts:
          - path: /app/config.yml
            subPath: config.yaml
      # cert:
      #   type: secret
      #   name: blocky-tls
      #   globalMounts:
      #     - path: /app/cert
    service:
      blocky:
        ports:
          http:
            port: 4000
            protocol: HTTP
      dns:
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "${BLOCKY_IP},${BLOCKY_IPv6}"
        ipFamilyPolicy: RequireDualStack
        externalTrafficPolicy: Local
        ports:
          tcp:
            port: 53
            targetPort: *dnsPort
            protocol: TCP
          udp:
            port: 53
            targetPort: *dnsPort
            protocol: UDP
    serviceMonitor:
      blocky:
        service:
          name: blocky
        endpoints:
          - port: http
            path: /metrics
    route:
      blocky:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Blocky
          gethomepage.dev/icon: blocky
          gethomepage.dev/description: DNS proxy and ad-blocker written in Go
          gethomepage.dev/group: Network
        parentRefs:
          - name: traefik-gateway
            namespace: network
            sectionName: websecure
        hostnames:
          - blocky.${CLUSTER_DOMAIN}
        rules:
          - backendRefs:
              - identifier: blocky
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: auth-chain
