---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: &serviceAccountName tailscale
        pod:
          automountServiceAccountToken: true
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/tailscale/tailscale
              tag: v1.98.4@sha256:25cde9ad76020b0e29229136d0c38b5962e9a0e1774ffac9b0df68e4a37d6cf0
            env:
              TZ: ${TIME_ZONE}
              PORT: &peerPort 41641
              TS_HOSTNAME: home-lan-router
              TS_USERSPACE: false
              TS_ROUTES: "${LAN_CIDR},${LAN_CIDRv6}"
              TS_ENABLE_HEALTH_CHECK: true
              TS_ENABLE_METRICS: true
              TS_KUBE_SECRET: &stateSecret tailscale-state
              SA_NAME: *serviceAccountName
              POD_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              POD_UID:
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.uid
            envFrom:
              - secretRef:
                  name: tailscale-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 9002
                    path: /healthz
              readiness: *probe
            resources:
              requests:
                cpu: 5m
                memory: 128M
              limits:
                memory: 256M
                devic.es/tun: "1"
            securityContext:
              runAsUser: 0
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_ADMIN
                  - NET_RAW
    persistence:
      tmp:
        type: emptyDir
      run:
        type: emptyDir
      var-run-tailscale:
        type: emptyDir
        globalMounts:
          - path: /var/run/tailscale
      modules:
        type: hostPath
        hostPath: /lib/modules
        hostPathType: Directory
        globalMounts:
          - path: /lib/modules
            readOnly: true
    service:
      tailscale:
        ports:
          http:
            port: *port
            protocol: HTTP
      peer:
        type: LoadBalancer
        annotations:
          metallb.io/loadBalancerIPs: "${TAILSCALE_IP},${TAILSCALE_IPv6}"
        ipFamilyPolicy: RequireDualStack
        externalTrafficPolicy: Local
        ports:
          udp:
            port: *peerPort
            protocol: UDP
    serviceMonitor:
      app:
        service:
          name: tailscale
        endpoints:
          - port: http
            path: /metrics
    serviceAccount:
      *serviceAccountName : {}
    rbac:
      bindings:
        tailscale:
          type: RoleBinding
          roleRef:
            kind: Role
            name: tailscale
          subjects:
            - identifier: *serviceAccountName
      roles:
        tailscale:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - secrets
              resourceNames:
                - *stateSecret
              verbs:
                - create
                - get
                - update
                - patch
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - get
                - create
                - patch
