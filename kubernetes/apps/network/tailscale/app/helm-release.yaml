---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          hostNetwork: true
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/tailscale/tailscale
              tag: v1.96.5@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
            env:
              TZ: ${TIME_ZONE}
              PORT: &port 45387
              TS_USERSPACE: false
              # TS_EXTRA_ARGS: "--advertise-exit-node"
              TS_KUBE_SECRET: &stateSecret tailscale-state
              SA_NAME: &serviceAccount tailscale
              TS_ROUTES: "${LAN_CIDR},${LAN_CIDRv6}"
            envFrom:
              - secretRef:
                  name: tailscale-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            resources:
              requests:
                cpu: 5m
                memory: 128M
              limits:
                memory: 256M
                devic.es/tun: "1"
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_ADMIN
                  - NET_RAW
                  - SYS_MODULE
    service:
      app:
        ports:
          http:
            port: 2000
            protocol: HTTP
      tailnet:
        ports:
          tailnet-udp:
            port: *port
            protocol: UDP
    serviceAccount:
      name: *serviceAccount
    rbac:
      bindings:
        tailscale:
          type: RoleBinding
          roleRef:
            kind: Role
            name: tailscale
          subjects:
            - kind: ServiceAccount
              name: tailscale
      roles:
        tailscale:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - secrets
              verbs:
                - create
            - apiGroups:
                - ""
              resourceNames:
                - *stateSecret
              resources:
                - secrets
              verbs:
                - get
                - update
                - patch
