---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  driftDetection:
    mode: enabled
  values:
    controllers:
      app:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: &serviceAccountName tailscale
        pod:
          hostNetwork: true
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/tailscale/tailscale
              tag: v1.96.5@sha256:dbeff02d2337344b351afac203427218c4d0a06c43fc10a865184063498472a6
            env:
              TZ: ${TIME_ZONE}
              TS_HOSTNAME: tailscale-router
              TS_USERSPACE: false
              # TS_EXTRA_ARGS: "--advertise-exit-node"
              TS_ENABLE_HEALTH_CHECK: true
              TS_ENABLE_METRICS: true
              TS_KUBE_SECRET: &stateSecret tailscale-state
              SA_NAME: *serviceAccountName
              TS_ROUTES: "${LAN_CIDR},${LAN_CIDRv6}"
            envFrom:
              - secretRef:
                  name: tailscale-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 9002
                    path: /healthz
              readiness: *probe
            resources:
              requests:
                cpu: 5m
                memory: 128M
              limits:
                memory: 256M
                devic.es/tun: "1"
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
                add:
                  - NET_ADMIN
                  - NET_RAW
    persistence:
      modules:
        type: hostPath
        hostPath: /lib/modules
        hostPathType: Directory
        globalMounts:
          - path: /lib/modules
            readOnly: true
    service:
      app:
        ports:
          http:
            port: *port
            protocol: HTTP
    serviceMonitor:
      app:
        service:
          name: tailscale
        endpoints:
          - port: http
            path: /metrics
    serviceAccount:
      *serviceAccountName : {}
    rbac:
      bindings:
        tailscale:
          type: RoleBinding
          roleRef:
            kind: Role
            name: tailscale
          subjects:
            - identifier: *serviceAccountName
      roles:
        tailscale:
          type: Role
          rules:
            - apiGroups:
                - ""
              resources:
                - secrets
              verbs:
                - create
            - apiGroups:
                - ""
              resourceNames:
                - *stateSecret
              resources:
                - secrets
              verbs:
                - get
                - update
                - patch
