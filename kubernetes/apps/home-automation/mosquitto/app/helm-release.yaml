---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mosquitto
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      mosquitto:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 12003
            runAsGroup: 12003
            fsGroup: 12003
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: eclipse-mosquitto
              tag: 2.0.22@sha256:914f529386804c8278a4e581526b9be5e1604df44b30daabc70aa97dcefe5268
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ['mosquitto_sub', '-p', '1880', '-t', '$$SYS/#', '-C', '1', '-E', '-i', 'probe', '-W', '3']
                  periodSeconds: 15
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 8Mi
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      cache:
        existingClaim: mosquitto-data
        globalMounts:
          - path: /mosquitto/data
      config:
        type: configMap
        name: mosquitto-config
        globalMounts:
          - path: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
      passwd:
        type: secret
        name: mosquitto-passwd
        defaultMode: 256 # 0400
        globalMounts:
          - path: /mosquitto/config/passwd
            subPath: passwd
    service:
      app:
        ports:
          mqtt:
            port: 1883
