---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 12000
            runAsGroup: 12000
            fsGroup: 12000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          home-assistant:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.5.4@sha256:42d1bc5e99ed0ae8f49b72b8994e25e1a6b0f1467ba26c1b959f54ca42541ffd
            env:
              VENV_FOLDER: /config/.venv
            resources:
              requests:
                cpu: 100m
                memory: 500Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
          hass-configurator:
            image:
              repository: causticlab/hass-configurator-docker
              tag: 0.6.0@sha256:06f064f1b4a5b17d8095e8565ae334267c4af9c6eaae19b4da536959ea6498b8
            resources:
              requests:
                cpu: 5m
                memory: 16Mi
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      home-assistant-config:
        existingClaim: home-assistant-config
        advancedMounts:
          home-assistant:
            home-assistant:
              - path: /config
            hass-configurator:
              - path: /home-assistant-config
      hass-configurator-config:
        type: secret
        name: hass-configurator-config
        advancedMounts:
          home-assistant:
            hass-configurator:
              - path: /config
      tmp:
        type: emptyDir
        advancedMounts:
          home-assistant:
            home-assistant:
              - path: /tmp
    service:
      home-assistant:
        primary: true
        ports:
          http:
            port: 8123
            protocol: HTTP
      configurator:
        ports:
          http:
            port: 3218
            protocol: HTTP
    route:
      home-assistant:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Home Assistant
          gethomepage.dev/icon: home-assistant
          gethomepage.dev/description: Local smart home control and automation
          gethomepage.dev/group: Home Automation
          gethomepage.dev/app: home-assistant
        hostnames:
          - &host homeassistant.${CLUSTER_DOMAIN}
        rules:
          - backendRefs:
              - identifier: home-assistant
        parentRefs: &parentRefs
          - name: traefik-gateway
            namespace: network
            sectionName: websecure
      configurator:
        hostnames:
          - *host
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /code/
            filters:
              - type: ExtensionRef
                extensionRef:
                  group: traefik.io
                  kind: Middleware
                  name: auth-chain
              - type: URLRewrite
                urlRewrite:
                  path:
                    type: ReplacePrefixMatch
                    replacePrefixMatch: /
            backendRefs:
              - identifier: configurator
        parentRefs: *parentRefs
