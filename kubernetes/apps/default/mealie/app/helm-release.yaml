---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/spec/replicas"]
  values:
    controllers:
      mealie:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 6060
            runAsGroup: 6060
            fsGroup: 6060
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.16.0@sha256:74496aed2c5055e3b7b6c4e1bb9b4f16b1f566601582b258a10bae851f19ac24
            env:
              PUID: 6060
              PGID: 6060
              TZ: ${TIME_ZONE}
              BASE_URL: https://mealie.${CLUSTER_DOMAIN}
              API_DOCS: false
              ALLOW_PASSWORD_LOGIN: false
              OIDC_AUTH_ENABLED: true
              OIDC_CONFIGURATION_URL: https://authelia.${CLUSTER_DOMAIN}/.well-known/openid-configuration
              OIDC_CLIENT_ID: mealie
              OIDC_USER_GROUP: id_user
              OIDC_ADMIN_GROUP: id_admin
              OIDC_AUTO_REDIRECT: true
              OIDC_REMEMBER_ME: true
              SMTP_AUTH_STRATEGY: NONE
              SMTP_HOST: maddy.default.svc.cluster.local
              SMTP_PORT: 2525
              SMTP_FROM_NAME: Mealie
              SMTP_FROM_EMAIL: noreply@mail.${CLUSTER_DOMAIN}
            envFrom:
              - secretRef:
                  name: mealie-secret
            resources:
              requests:
                memory: 384Mi
                cpu: 50m
              limits:
                memory: 768Mi
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /app/healthcheck.sh
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      data:
        existingClaim: mealie-data
        globalMounts:
          - path: /app/data
    service:
      app:
        ports:
          http:
            port: 9000
            protocol: HTTP
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Mealie
          gethomepage.dev/icon: mealie
          gethomepage.dev/description: Recipe manager and meal planner
          gethomepage.dev/group: Apps
          gethomepage.dev/widget.type: mealie
          gethomepage.dev/widget.version: "2"
          gethomepage.dev/widget.url: https://mealie.${CLUSTER_DOMAIN}
          gethomepage.dev/widget.key: "{{ `{{HOMEPAGE_VAR_MEALIE_API_TOKEN}}` }}"
        hostnames:
          - mealie.${CLUSTER_DOMAIN}
        rules:
          - backendRefs:
              - identifier: app
        parentRefs:
          - name: traefik-gateway
            namespace: network
            sectionName: websecure
