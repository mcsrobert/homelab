---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-cnpg
spec:
  # renovate: datasource=docker versioning=loose
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18.4-1.1.1@sha256:9c9246cb8ba0332f7e1115def71329410657237db8ef104160a479a89c7e03a2
  primaryUpdateStrategy: unsupervised
  instances: 2
  storage:
    size: 10Gi
    storageClass: longhorn-cnpg
  bootstrap:
    recovery:
      source: garage-backups
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: immich-garage-store
  externalClusters:
    - name: garage-backups
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: immich-garage-store
          serverName: immich-cnpg-v2
  postgresql:
    shared_preload_libraries:
      - vchord.so
    parameters:
      shared_buffers: 256MB
  resources:
    requests:
      cpu: 50m
    limits:
      memory: 1Gi
  monitoring:
    enablePodMonitor: true
