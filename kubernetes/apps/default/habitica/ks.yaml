---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: habitica
  namespace: flux-system
spec:
  dependsOn:
    - name: gateway-api-crds
    - name: habitica-mongodb
  path: /kubernetes/apps/default/habitica/app
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: default
  interval: 30m
  timeout: 5m
  wait: true
  prune: true
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/kustomization-kustomize-v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name habitica-mongodb
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
    - name: mongodb-operator
  path: /kubernetes/apps/default/habitica/mongodb
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: &namespace default
  interval: 30m
  timeout: 5m
  wait: true
  prune: true
  healthChecks:
    - kind: StatefulSet
      name: *name
      namespace: *namespace
