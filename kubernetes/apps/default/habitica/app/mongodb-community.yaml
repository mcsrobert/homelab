---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/mongodbcommunity.mongodb.com/mongodbcommunity_v1.json
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: habitica-mongodb
spec:
  members: 1
  type: ReplicaSet
  # TODO: renovate tag
  version: 8.3.2
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: mongod
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi
  security:
    authentication:
      modes: ["SCRAM"]
  users:
    - name: habitica
      db: admin
      passwordSecretRef:
        name: habitica-mongodb-secret
      roles:
        - name: readWrite
          db: habitica
      scramCredentialsSecretName: habitica-mongodb-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
    storage.wiredTiger.engineConfig.cacheSizeGB: 0.25
