---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret habitica-mongodb-auth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: *secret
    template:
      engineVersion: v2
      data:
        password: "{{ .PASSWORD }}"
        uri: mongodb://habitica:{{ .PASSWORD }}@habitica-mongodb-svc.default.svc.cluster.local:27017/habitica?authSource=admin&replicaSet=habitica-mongodb
  data:
    - secretKey: PASSWORD
      remoteRef:
        key: habitica/mongodb
        property: PASSWORD
