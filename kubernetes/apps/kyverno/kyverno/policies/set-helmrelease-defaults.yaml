---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/policies.kyverno.io/mutatingpolicy_v1.json
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: set-helmrelease-defaults
  annotations:
    policies.kyverno.io/title: HelmRelease defaults
    policies.kyverno.io/description: >-
      Applies Flux HelmRelease remediation and drift detection defaults when
      fields are not set in the manifest.
spec:
  evaluation:
    background:
      enabled: true
    admission:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: ["helm.toolkit.fluxcd.io"]
        apiVersions: ["v2"]
        resources: ["helmreleases"]
        operations: ["CREATE", "UPDATE"]
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: |
          Object{
            spec: Object.spec{
              driftDetection: Object.spec.driftDetection{
                mode: object.?spec.?driftDetection.?mode.orValue("enabled")
              },
              install: Object.spec.install{
                remediation: Object.spec.install.remediation{
                  retries: object.?spec.?install.?remediation.?retries.orValue(3),
                  remediateLastFailure: object.?spec.?install.?remediation.?remediateLastFailure.orValue(true)
                }
              },
              upgrade: Object.spec.upgrade{
                cleanupOnFail: object.?spec.?upgrade.?cleanupOnFail.orValue(true),
                remediation: Object.spec.upgrade.remediation{
                  strategy: object.?spec.?upgrade.?remediation.?strategy.orValue("rollback"),
                  retries: object.?spec.?upgrade.?remediation.?retries.orValue(3),
                  remediateLastFailure: object.?spec.?upgrade.?remediation.?remediateLastFailure.orValue(true)
                }
              },
              rollback: Object.spec.rollback{
                cleanupOnFail: object.?spec.?rollback.?cleanupOnFail.orValue(true)
              }
            }
          }
