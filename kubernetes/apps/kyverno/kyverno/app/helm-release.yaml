---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  chart:
    spec:
      chart: kyverno
      version: 3.7.1
      sourceRef:
        kind: HelmRepository
        name: kyverno
  interval: 1h
  driftDetection:
    mode: enabled
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:  # https://github.com/kyverno/kyverno/tree/main/charts/kyverno#values

    admissionController:
      replicas: 2
      serviceMonitor:
        enabled: true

    backgroundController:
      serviceMonitor:
        enabled: true

    cleanupController:
      serviceMonitor:
        enabled: true

    reportsController:
      serviceMonitor:
        enabled: true

    grafana:
      enabled: true
      annotations:
        grafana_folder: kyverno
