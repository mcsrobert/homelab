---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
spec:
  chart:
    spec:
      chart: kyverno
      version: 3.8.2
      sourceRef:
        kind: HelmRepository
        name: kyverno
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:  # https://github.com/kyverno/kyverno/tree/main/charts/kyverno#values

    admissionController:
      replicas: 2
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - helm.toolkit.fluxcd.io
              resources:
                - helmreleases
              verbs:
                - get
                - list
                - watch
                - update
                - patch
      serviceMonitor:
        enabled: true

    backgroundController:
      rbac:
        clusterRole:
          extraResources:
            - apiGroups:
                - helm.toolkit.fluxcd.io
              resources:
                - helmreleases
              verbs:
                - get
                - list
                - watch
                - update
                - patch
      serviceMonitor:
        enabled: true

    cleanupController:
      serviceMonitor:
        enabled: true

    reportsController:
      serviceMonitor:
        enabled: true

    grafana:
      enabled: true
      annotations:
        grafana_folder: kyverno
