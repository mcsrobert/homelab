---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.1/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      authelia:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            fsGroup: 10000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          authelia:
            image:
              repository: ghcr.io/authelia/authelia
              tag: 4.39.20@sha256:1b363e9279e742397966333f364e0876ae02bf5c876de73e83af6d48c57ff51b
            envFrom:
              - secretRef:
                  name: authelia-env
            env:
              X_AUTHELIA_CONFIG: /config/configuration.yaml
              X_AUTHELIA_CONFIG_FILTERS: template
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      data:
        existingClaim: authelia-data
      config:
        type: configMap
        name: authelia-config
        globalMounts:
          - path: /config/configuration.yaml
            subPath: configuration.yaml
      oidc-cert:
        type: secret
        name: authelia-oidc-tls
        globalMounts:
          - path: /oidc
      oidc-client-secrets:
        type: secret
        name: authelia-oidc-client-secrets
        globalMounts:
          - path: /oidc/clients
    service:
      authelia:
        ports:
          http:
            port: 9091
            protocol: HTTP
            primary: true
          metrics:
            port: 9959
            protocol: HTTP
    serviceMonitor:
      authelia:
        serviceName: authelia
        endpoints:
          - port: metrics
            path: /metrics
    route:
      authelia:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Authelia
          gethomepage.dev/icon: authelia
          gethomepage.dev/description: Open-source authentication and authorization server
          gethomepage.dev/group: Auth
        parentRefs:
          - name: traefik-gateway
            namespace: network
            sectionName: websecure
        hostnames:
          - "authelia.${CLUSTER_DOMAIN}"
