---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
spec:
  interval: 30m
  chart:
    spec:
      chart: openbao
      version: 0.28.6
      sourceRef:
        kind: HelmRepository
        name: openbao
  values: # https://github.com/openbao/openbao-helm/blob/main/charts/openbao/values.yaml
    global:
      tlsDisable: false
    server:
      enabled: true
      updateStrategyType: RollingUpdate
      statefulSet:
        annotations:
          reloader.stakater.com/auto: "true"

      standalone:
        enabled: true
        config: |
          ui            = true
          disable_mlock = true
          api_addr      = "https://bao.${CLUSTER_DOMAIN}"

          listener "tcp" {
            address         = "[::]:8200"
            cluster_address = "[::]:8201"

            tls_cert_file   = "/tls/tls.crt"
            tls_key_file    = "/tls/tls.key"
            tls_min_version = "tls13"

            telemetry {
              disable_hostname               = true
              unauthenticated_metrics_access = true
            }
          }

          storage "raft" {
            path    = "/openbao/data"
            node_id = "node1"
          }

          audit "file" "to-stdout" {
            options {
              file_path = "/dev/stdout"
              log_raw   = "true"
            }
          }

          seal "static" {
            disabled       = false
            current_key_id = "20260606-1"
            current_key    = "file:///openbao/secrets/unseal-20260606-1.key"
          }

          initialize "bootstrap" {

            request "enable-kv-v2" {
              operation = "update"
              path      = "sys/mounts/homelab"
              data      = { type = "kv-v2" }
            }

            request "enable-k8s-auth" {
              operation = "update"
              path      = "sys/auth/kubernetes"
              data      = { type = "kubernetes" }
            }

            request "configure-k8s-auth" {
              operation = "update"
              path      = "auth/kubernetes/config"
              data = { kubernetes_host = "https://kubernetes.default.svc.cluster.local" }
            }

            request "write-eso-policy" {
              operation = "update"
              path      = "sys/policies/acl/eso-readonly"
              data = {
                policy = <<EOT
                  path "homelab/data/*" { capabilities = ["read"] }
                  path "homelab/metadata/*" { capabilities = ["list", "read"] }
                EOT
              }
            }

            request "map-eso-role" {
              operation = "update"
              path      = "auth/kubernetes/role/eso-role"
              data = {
                bound_service_account_names      = ["external-secrets"]
                bound_service_account_namespaces = ["security"]
                token_ttl                        = "1h"
                token_max_ttl                    = "4h"
                token_policies                   = ["eso-readonly"]
              }
            }
            request "enable-ldap-auth" {
              operation = "update"
              path      = "sys/auth/ldap"
              data      = { type = "ldap" }
            }

            request "configure-ldap-auth" {
              operation = "update"
              path      = "auth/ldap/config"
              data = {
                url         = "ldap://lldap.auth.svc.cluster.local"
                binddn      = "uid=openbao,ou=people,${LDAP_BASE_DN}"
                bindpass    = { eval_type = "string", eval_source = "env", env_var = "LLDAP_BIND_PASSWORD" }
                userdn      = "ou=people,${LDAP_BASE_DN}"
                userattr    = "uid"
                groupdn     = "ou=groups,${LDAP_BASE_DN}"
                groupattr   = "cn"
                groupfilter = "(&(objectClass=groupOfUniqueNames)(member={{"{{.UserDN}}"}}))"
              }
            }

            request "write-admin-policy" {
              operation = "update"
              path      = "sys/policies/acl/admin"
              data = {
                policy = <<EOT
                  path "*" { capabilities = ["create", "read", "update", "delete", "list", "sudo"] }
                EOT
              }
            }

            request "map-admin-group" {
              operation = "update"
              path      = "auth/ldap/groups/openbao_admin"
              data      = { policies = ["admin"] }
            }
          }

          telemetry {
            prometheus_retention_time = "30s"
            disable_hostname          = true
          }

      extraSecretEnvironmentVars:
        - envName: LLDAP_BIND_PASSWORD
          secretName: openbao-auth-lldap
          secretKey: bind-password

      dataStorage:
        enabled: true
        size: 2Gi

      auditStorage:
        enabled: false

      volumes:
        - name: secrets
          secret:
            secretName: openbao-secrets
        - name: tls
          secret:
            secretName: openbao-tls

      volumeMounts:
        - name: secrets
          mountPath: /openbao/secrets
          readOnly: true
        - name: tls
          mountPath: /tls
          readOnly: true

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

      networkPolicy:
        enabled: true
        ingress:
          - from:
              - podSelector: {}
              - namespaceSelector:
                  matchLabels:
                    name: observability
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmagent
              - ipBlock:
                  cidr: ${LAN_CIDR}
              - ipBlock:
                  cidr: ${LAN_CIDRv6}
            ports:
              - port: 8200
                protocol: TCP

    ui:
      enabled: true
      annotations:
        metallb.io/loadBalancerIPs: "${OPENBAO_IP},${OPENBAO_IPv6}"
      serviceType: LoadBalancer
      serviceIPFamilyPolicy: RequireDualStack
      externalTrafficPolicy: Local
      externalPort: 443

    serverTelemetry:
      serviceMonitor:
        enabled: true
      prometheusRules:
        enabled: true
      grafanaDashboard:
        enabled: true
        extraAnnotations:
          grafana_folder: security
