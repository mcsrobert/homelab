---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:  # Docs: https://github.com/external-secrets/external-secrets/tree/main/deploy/charts/external-secrets
    resources:
      requests:
        cpu: 5m
        memory: 48Mi
      limits:
        memory: 96Mi
    certController:
      resources:
        requests:
          cpu: 5m
          memory: 48Mi
        limits:
          memory: 96Mi
    webhook:
      resources:
        requests:
          cpu: 5m
          memory: 48Mi
        limits:
          memory: 96Mi
    serviceMonitor:
      enabled: true
