---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb-operator
spec:
  chart:
    spec:
      chart: mongodb-kubernetes
      version: 1.9.1
      sourceRef:
        kind: HelmRepository
        name: mongodb
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values: # https://github.com/mongodb/mongodb-kubernetes/blob/master/helm_chart/values.yaml
    operator:
      name: mongodb-operator
      watchNamespace: "*"
      resources:
        requests:
          cpu: 10m
          memory: 200Mi
        limits:
          memory: 256Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
