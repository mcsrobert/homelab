---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb-operator
spec:
  chart:
    spec:
      chart: mongodb-kubernetes
      version: 1.8.1
      sourceRef:
        kind: HelmRepository
        name: mongodb
  interval: 30m
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values: # https://github.com/mongodb/mongodb-kubernetes/blob/master/helm_chart/values.yaml
    operator:
      name: mongodb-operator
      # resources:
      #   requests:
      #     cpu: 500m
      #     memory: 200Mi
      #   limits:
      #     cpu: 1100m
      #     memory: 1Gi
      # securityContext: {}
