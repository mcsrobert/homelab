---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values: # https://github.com/mogenius/renovate-operator/blob/main/charts/renovate-operator/values.yaml
    fullnameOverride: renovate-operator
    webhook:
      enabled: true
    auth:
      defaultAllowedGroups: id_admin
      oidc:
        enabled: true
        issuerUrl: https://authelia.${CLUSTER_DOMAIN}
        redirectUrl: https://renovate.${CLUSTER_DOMAIN}/auth/callback
        clientId: renovate-operator
        existingSecret: renovate-operator-secret
        additionalScopes:
          - groups
        fetchUserInfoGroups: true
    route:
      enabled: true
      hostnames:
        - renovate.${CLUSTER_DOMAIN}
      parentRefs:
        - name: traefik-gateway
          namespace: network
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
        annotations:
          grafana_folder: development
