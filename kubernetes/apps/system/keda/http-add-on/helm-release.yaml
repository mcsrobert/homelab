---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda-http-add-on
spec:
  chart:
    spec:
      chart: keda-add-ons-http
      version: 0.12.2
      sourceRef:
        kind: HelmRepository
        name: kedacore
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:  # https://github.com/kedacore/charts/tree/main/http-add-on#configuration
    interceptor:
      replicas:
        min: 1
        max: 10
      tcpConnectTimeout: 5000ms # default: 500ms
      keepAlive: 10s # default: 1s
      responseHeaderTimeout: 5000ms # default: 500ms
    scaler:
      replicas: 1
