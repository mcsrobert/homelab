---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  chart:
    spec:
      chart: keda
      version: 2.19.0
      sourceRef:
        kind: HelmRepository
        name: kedacore
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:  # https://github.com/kedacore/charts/tree/main/keda#configuration
    enableServiceLinks: false
