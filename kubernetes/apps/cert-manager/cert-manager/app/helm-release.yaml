---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: v1.20.2
      sourceRef:
        kind: HelmRepository
        name: jetstack
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    crds:
      enabled: true
    dns01RecursiveNameserversOnly: true
    dns01RecursiveNameservers: https://1.1.1.1/dns-query,https://1.0.0.1/dns-query
    resources:
      requests:
        cpu: 5m
        memory: 32Mi
      limits:
        memory: 128Mi
    networkPolicy:
      enabled: true
    webhook:
      resources:
        requests:
          cpu: 5m
          memory: 16Mi
        limits:
          memory: 64Mi
      networkPolicy:
        enabled: true
    cainjector:
      resources:
        requests:
          cpu: 5m
          memory: 128Mi
        limits:
          memory: 256Mi
      networkPolicy:
        enabled: true
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
