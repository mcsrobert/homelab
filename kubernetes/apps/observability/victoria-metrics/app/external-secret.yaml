---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &secret alertmanager-config-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler
  target:
    name: *secret
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |-
          route:
            receiver: ntfy
            group_by:
              - alertname
            routes:
              - matchers:
                  - alertname = Watchdog
                receiver: blackhole
          receivers:
            - name: blackhole
              webhook_configs: []
            - name: ntfy
              webhook_configs:
              - url: http://alertmanager-ntfy.observability.svc.cluster.local:8000/hook
                http_config:
                  basic_auth:
                    username: {{ .ALERTMANAGER_NTFY_HTTP_USERNAME }}
                    password: {{ .ALERTMANAGER_NTFY_HTTP_PASSWORD }}
  dataFrom:
    - extract:
        key: ALERTMANAGER_NTFY
