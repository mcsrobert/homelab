---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-5.0.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alertmanager-ntfy
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    controllers:
      alertmanager-ntfy:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 5000
            runAsGroup: 5000
            fsGroup: 5000
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
        containers:
          app:
            image:
              repository: ghcr.io/alexbakker/alertmanager-ntfy
              tag: 1.2.1@sha256:2a862f23c8fb67f777824979487c06a417b2f9bbbc2eb45a974a1fb45b9bbff3
            args:
              - --configs
              - &configPath /config.yaml
            probes:
              readiness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 8000
                    path: /health
              liveness: *probe
            resources:
              requests:
                cpu: 1m
                memory: 16Mi
              limits:
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    service:
      app:
        ports:
          http:
            port: *port
            protocol: HTTP
    persistence:
      config:
        type: secret
        name: alertmanager-ntfy-config-secret
        globalMounts:
          - path: *configPath
            subPath: config.yaml
