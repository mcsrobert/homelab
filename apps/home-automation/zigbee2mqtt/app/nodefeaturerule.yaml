---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: conbee2
spec:
  rules:
    - name: ConBee II
      labelsTemplate: |-
        conbee2-adapter.serial-{{.usb.device.serial}}=true
      matchFeatures:
        - feature: usb.device
          matchExpressions:
            class: {op: In, value: ["02"]}
            vendor: {op: In, value: ["1cf1"]}
            device: {op: In, value: ["0030"]}
